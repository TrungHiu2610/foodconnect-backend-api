name: FoodConnect Backend CI/CD

on:
  push:
    branches: [ "develop"]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore --configuration Release
      
    - name: Test
      run: dotnet test --no-build --verbosity normal --configuration Release
      
    - name: Publish
      run: dotnet publish -c Release -o ./publish
      
    - name: Upload published files
      uses: actions/upload-artifact@v4
      with:
        name: backend-publish
        path: ./publish

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./FoodConnect.Backend.API/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/foodconnect-backend:develop
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/foodconnect-backend:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/foodconnect-backend:buildcache,mode=max

    - name: Deploy to Development VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }} 
        username: ${{ secrets.VPS_USERNAME }} 
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        script: |
          docker stop foodconnect-dev-api || true
          docker rm foodconnect-dev-api || true
          
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/foodconnect-backend:develop
          
          docker run -d \
            --name foodconnect-dev-api \
            -p 8080:8080 \
            -e "ASPNETCORE_URLS=http://+:8080" \
            -e "ASPNETCORE_ENVIRONMENT=Development" \
            -e "ConnectionStrings__DefaultConnection=${{ secrets.CONNECTION_STRING }}" \
            -e "JwtSettings__Secret=${{ secrets.JWT_SECRET }}" \
            -e "AWS__BucketName=${{ secrets.AWS_BUCKET_NAME }}" \
            -e "AWS__AccessKey=${{ secrets.AWS_ACCESS_KEY }}" \
            -e "AWS__SecretKey=${{ secrets.AWS_SECRET_KEY }}" \
            -e "AWS__Region=${{ secrets.AWS_REGION }}" \
            -e "AWS__PublicBaseUrl=${{ secrets.AWS_PUBLIC_BASE_URL }}" \
            --restart always \
            ${{ secrets.DOCKERHUB_USERNAME }}/foodconnect-backend:develop

